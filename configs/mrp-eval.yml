# Multi-token denoising eval (opencompass) environment.

app_name: mrp-eval-ssh
job_name: mrp-eval
open_vscode: true

base_image: nvidia/cuda:12.4.1-cudnn-devel-ubuntu22.04
add_python: "3.11"

gpu:
  type: H100
  count: 4

duration_hours: 24

ssh_public_keys:
  - ~/.ssh/id_ed25519_modal.pub

github_ssh_key: ~/.ssh/id_ed25519_github

git_repo: git@github.com:heavyball-research/multi-token-residual-prediction.git

apt_packages:
  - openssh-server
  - git
  - wget
  - curl
  - tmux
  - vim
  - build-essential

# Each run_commands item is its own shell, so we use absolute pip paths and absolute cds.
run_commands:
  # Miniconda
  - wget -q https://repo.anaconda.com/miniconda/Miniconda3-latest-Linux-x86_64.sh -O /tmp/miniconda.sh
  - bash /tmp/miniconda.sh -b && rm /tmp/miniconda.sh
  - /root/miniconda3/bin/conda init bash
  - /root/miniconda3/bin/conda tos accept --override-channels --channel https://repo.anaconda.com/pkgs/main
  - /root/miniconda3/bin/conda tos accept --override-channels --channel https://repo.anaconda.com/pkgs/r
  # Env
  - /root/miniconda3/bin/conda create -n opencompass python=3.10 -y
  # Torch (cu128)
  - /root/miniconda3/envs/opencompass/bin/pip install torch==2.7.1+cu128 torchvision==0.22.1+cu128 torchaudio==2.7.1+cu128 --index-url https://download.pytorch.org/whl/cu128
  # flash-attn build prereqs (--no-build-isolation skips pip's isolated build env).
  - /root/miniconda3/envs/opencompass/bin/pip install psutil packaging ninja wheel setuptools
  # flash-attn — needs torch visible at build time.
  - /root/miniconda3/envs/opencompass/bin/pip install flash-attn==2.8.3 --no-build-isolation
  # vllm with --no-deps so it doesn't drag in transformers>=4.55.2 (the requirements
  # file pins an older transformers). Installed BEFORE requirements.txt so pip sees
  # vllm==0.10.2 as already satisfied and skips re-resolving its deps.
  - /root/miniconda3/envs/opencompass/bin/pip install --no-deps vllm==0.10.2
  # Repo eval deps
  - cd /root/multi-token-denoising && /root/miniconda3/envs/opencompass/bin/pip install -r src/eval/requirements.txt
  # opencompass editable install
  - cd /root/multi-token-denoising/src/eval/opencompass && /root/miniconda3/envs/opencompass/bin/pip install -e .
  # Node.js + npm + Codex CLI
  - apt-get update && apt-get install -y nodejs npm
  - npm install -g @openai/codex
  # nohup-queue helper
  - cd /root && git clone https://github.com/Zephyr271828/nohup-queue.git && /root/miniconda3/envs/opencompass/bin/pip install -e /root/nohup-queue
  # Auto-activate the env on SSH login
  - echo 'source /root/miniconda3/etc/profile.d/conda.sh' >> /root/.bashrc
  - echo 'conda activate opencompass' >> /root/.bashrc
  - echo 'source /root/.bashrc' >> /root/.profile

volumes:
  /root/.cache/huggingface: huggingface-cache

secrets:
  - huggingface-secret

shell_env:
  HF_HOME: /root/.cache/huggingface
  HF_TOKEN: $HF_TOKEN
